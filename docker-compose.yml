version: "3.8"

services:
  # --- FastAPI 后端 ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keji-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - media:/app/media
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./keji.db}
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-FunAudioLLM/SenseVoiceSmall}
      - UPLOAD_DIR=/app/uploads
      - MEDIA_DIR=/app/media
    depends_on:
      - redis
      - db
    restart: unless-stopped

  # --- Celery Worker ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keji-worker
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - media:/app/media
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./keji.db}
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-FunAudioLLM/SenseVoiceSmall}
      - UPLOAD_DIR=/app/uploads
      - MEDIA_DIR=/app/media
    depends_on:
      - redis
      - db
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: keji-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: keji-db
    environment:
      POSTGRES_USER: keji
      POSTGRES_PASSWORD: keji
      POSTGRES_DB: keji
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- 前端 (Nginx) ---
  frontend:
    image: nginx:alpine
    container_name: keji-frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
  media:
  redis-data:
  pg-data:
